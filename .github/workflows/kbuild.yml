# SPDX-License-Identifier: GPL-2.0-or-later
# Kbuild CI — build out-of-tree GKI modules using DDK containers.
#
# Two build paths run in parallel for each KMI:
#   make  — legacy make -C $KDIR M=..., always authoritative (gates merge)
#   bazel — DDK Phase 3: ddk_module() via kleaf (experimental, continue-on-error)
#
# Uses pre-built DDK images (ghcr.io/ylarod/ddk-min) which bundle
# the correct clang toolchain + kernel headers for each KMI.
# No kernel source clone, no vmlinux compile.

name: kbuild (GKI)

on:
  push:
    branches: [main]
    paths:
      - 'tests/kmod/**'
      - 'src/**'
      - 'include/**'
      - 'kmod/**'
      - 'examples/kbuild_hello/**'
      - 'scripts/ci/**'
      - 'scripts/build/**'
      - 'bazel/**'
      - 'WORKSPACE.bazel'
      - '.bazelrc'
      - '.github/workflows/kbuild.yml'
  pull_request:
    paths:
      - 'tests/kmod/**'
      - 'src/**'
      - 'include/**'
      - 'kmod/**'
      - 'examples/kbuild_hello/**'
      - 'scripts/ci/**'
      - 'scripts/build/**'
      - 'bazel/**'
      - 'WORKSPACE.bazel'
      - '.bazelrc'
      - '.github/workflows/kbuild.yml'
  workflow_dispatch:

jobs:
  kbuild:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ylarod/ddk-min:${{ matrix.kmi }}-20260313
      options: --privileged
    strategy:
      fail-fast: false
      matrix:
        kmi:
          - android12-5.10
          - android13-5.15
          - android14-6.1
          - android15-6.6
          - android16-6.12
    name: ${{ matrix.kmi }}
    steps:
      - name: Checkout KernelHook
        uses: actions/checkout@v4

      - name: Find kernel build directory
        id: kdir
        run: |
          # DDK containers expose kernel build tree — find it
          for candidate in /kernel /android-kernel /kernel-build \
                           /out/android*/dist /GKI_KERNEL_OUT; do
            if [ -f "$candidate/Module.symvers" ]; then
              echo "KDIR=$candidate" >> "$GITHUB_OUTPUT"
              echo "Found kernel build at $candidate"
              ls "$candidate/Module.symvers"
              exit 0
            fi
          done
          # Broader search
          FOUND=$(find / -name "Module.symvers" -maxdepth 6 2>/dev/null | head -1)
          if [ -n "$FOUND" ]; then
            KDIR=$(dirname "$FOUND")
            echo "KDIR=$KDIR" >> "$GITHUB_OUTPUT"
            echo "Found kernel build at $KDIR"
          else
            echo "ERROR: could not find kernel build directory"
            exit 1
          fi

      # ================================================================
      # Path A: make (authoritative — gates merge)
      # ================================================================

      - name: Build kh_test.ko (make)
        run: |
          KVER="${{ matrix.kmi }}"
          KVER="${KVER##*-}"
          make -C "${{ steps.kdir.outputs.KDIR }}" \
               M="$(pwd)/tests/kmod" \
               ARCH=arm64 LLVM=1 \
               KBUILD_MODPOST_WARN=1 \
               modules -j$(nproc)

      - name: Verify kh_test.ko
        run: |
          KVER="${{ matrix.kmi }}"
          KVER="${KVER##*-}"
          bash scripts/ci/verify_kmod.sh tests/kmod/kh_test.ko "$KVER"

      - name: Show modinfo
        if: always()
        run: |
          [ -f tests/kmod/kh_test.ko ] && modinfo tests/kmod/kh_test.ko || true

      - name: Upload artifact (make)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: kbuild-${{ matrix.kmi }}
          path: tests/kmod/kh_test.ko
          retention-days: 14

      # ================================================================
      # Path B: Bazel ddk_module() — Phase 3 (experimental)
      # continue-on-error: true until kleaf integration is fully validated
      # ================================================================

      - name: Setup Bazel DDK workspace
        id: bazel_setup
        continue-on-error: true
        run: |
          bash scripts/build/setup_bazel_ddk.sh \
              "${{ steps.kdir.outputs.KDIR }}"

      - name: Bazel build kh_test.ko (ddk_module)
        if: steps.bazel_setup.outcome == 'success'
        continue-on-error: true
        run: |
          bazel build //tests/kmod:kh_test \
              --config=kleaf \
              2>&1 | tail -20
          [ -f bazel-bin/tests/kmod/kh_test.ko ] && \
              modinfo bazel-bin/tests/kmod/kh_test.ko || true

      - name: Bazel build kernelhook.ko (ddk_module)
        if: steps.bazel_setup.outcome == 'success' && matrix.kmi == 'android14-6.1'
        continue-on-error: true
        run: |
          bazel build //kmod:kernelhook \
              --config=kleaf \
              2>&1 | tail -20
          [ -f bazel-bin/kmod/kernelhook.ko ] && \
              modinfo bazel-bin/kmod/kernelhook.ko || true

      - name: Upload artifact (bazel, if produced)
        if: steps.bazel_setup.outcome == 'success'
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: kbuild-bazel-${{ matrix.kmi }}
          path: |
            bazel-bin/tests/kmod/kh_test.ko
            bazel-bin/kmod/kernelhook.ko
          if-no-files-found: ignore
          retention-days: 7
