# Kbuild CI — build out-of-tree GKI modules against Android common-kernel.
# All logic lives in scripts/build/; this workflow is a thin wrapper.

name: kbuild (GKI)

on:
  push:
    branches: [main]
    paths:
      - 'tests/kmod/**'
      - 'src/**'
      - 'include/**'
      - 'kmod/**'
      - 'examples/kbuild_hello/**'
      - 'scripts/ci/**'
      - 'scripts/build/**'
      - '.github/workflows/kbuild.yml'
  pull_request:
    paths:
      - 'tests/kmod/**'
      - 'src/**'
      - 'include/**'
      - 'kmod/**'
      - 'examples/kbuild_hello/**'
      - 'scripts/ci/**'
      - 'scripts/build/**'
      - '.github/workflows/kbuild.yml'
  workflow_dispatch:

jobs:
  kbuild:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - branch: android12-5.10
          - branch: android13-5.15
          - branch: android14-6.1
          - branch: android15-6.6
          - branch: android16-6.12
    name: ${{ matrix.branch }}
    env:
      KERNEL_DIR: ${{ github.workspace }}/kernel
      KERNEL_OUT: ${{ github.workspace }}/kernel/out
    steps:
      - name: Checkout KernelHook
        uses: actions/checkout@v4

      - name: Cache kernel source
        uses: actions/cache@v4
        with:
          path: ${{ env.KERNEL_DIR }}
          key: gki-src-${{ matrix.branch }}-v1

      - name: Setup kbuild environment
        run: bash scripts/build/setup_kbuild_env.sh
        env:
          BRANCH: ${{ matrix.branch }}

      - name: Build and verify modules
        run: bash scripts/build/ci_kbuild.sh "${{ matrix.branch }}"

      - name: Show modinfo
        if: always()
        run: |
          for ko in tests/kmod/kh_test.ko kmod/kernelhook.ko examples/kbuild_hello/kbuild_hello.ko; do
            [ -f "$ko" ] && modinfo "$ko" || true
          done

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: kbuild-${{ matrix.branch }}
          path: |
            tests/kmod/kh_test.ko
            kmod/kernelhook.ko
            kmod/Module.symvers
            examples/kbuild_hello/kbuild_hello.ko
          if-no-files-found: warn
          retention-days: 14
